<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azka Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <!-- Left Side Links -->
        <div class="navbar-section left">            
            <a href="#HOME">HOME</a>
            
            <a href="#SHOP">SHOP</a>
        </div>

        <!-- Centered Logo -->
        <div class="navbar-logo">AZKA FASHION </div>

        <!-- Right Side Links -->
        <div class="navbar-section right">
            <a href="#ABOUT-US">ABOUT US</a>
            <a href="#CONTACT">CONTACT US</a>
        </div>
    </header>
     <!-- Video Grid Section -->
  <section class="video-grid">
    
    <video src="videos/video2.mp4" autoplay muted loop class="video video2"></video>
    <video src="videos/video3.mp4" autoplay muted loop class="video video3"></video>
    <video src="videos/video1.mp4" autoplay muted loop class="video video1"></video>
    <video src="videos/video4.mp4" autoplay muted loop class="video video4"></video>
  </section>

  <div class="brand-logos-wrapper">
    <div class="brand-logos" id="logoSlider">
    <img src="logoimg/Fabindia_logo.svg" alt="Shop Direct">
    <img src="logoimg/allen_solly-Photoroom.png" alt="Reitmans">
    <img src="logoimg/biba.png" alt="Morrisons">
    <img src="logoimg/zara-Photoroom.png" alt="New Look">
    <img src="logoimg/forever21-Photoroom.png" alt="Sainsbury's">
    <img src="logoimg/max-Photoroom.png" alt="Tesco">
    <img src="logoimg/celvinkelin-Photoroom.png" alt="River Island">
  </div>

  <div class="container">
    <button class="about-btn">About Us</button>
  
    <h1 class="scroll-text" id="animatedText">
      Azka Fashion is a premium fabric design studio<br>
crafting bespoke textiles and timeless styles<br>
for modern retailers around the world.
    </h1>
  </div>
  
  <script src="homepage.js"></script>
</body> 
</html>
